<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prediction Market Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #e0e6ed;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }
        .login-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 32px 28px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #f0f6fc;
            margin-bottom: 6px;
        }
        .login-header p {
            font-size: 12px;
            color: #8b949e;
        }
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid #21262d;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #8b949e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab.active {
            color: #58a6ff;
            border-bottom-color: #58a6ff;
        }
        .tab:hover { color: #c9d1d9; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e0e6ed;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            border-color: #58a6ff;
        }
        .form-input::placeholder { color: #484f58; }
        .submit-btn {
            width: 100%;
            padding: 11px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }
        .submit-btn.login-btn {
            background: #238636;
            color: #fff;
        }
        .submit-btn.login-btn:hover { background: #2ea043; }
        .submit-btn.register-btn {
            background: #1f6feb;
            color: #fff;
        }
        .submit-btn.register-btn:hover { background: #388bfd; }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error-msg {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #f85149;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg {
            background: rgba(63,185,80,0.1);
            border: 1px solid rgba(63,185,80,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #3fb950;
            margin-bottom: 16px;
            display: none;
        }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .footer-text {
            text-align: center;
            margin-top: 16px;
            font-size: 11px;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Prediction Market Dashboard</h1>
                <p>Arbitrage Monitor & Market Maker</p>
            </div>

            <div class="tabs">
                <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
            </div>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <!-- Login Form -->
            <div class="form-panel active" id="panel-login">
                <form onsubmit="doLogin(event)">
                    <div class="form-group">
                        <label>Username</label>
                        <input class="form-input" type="text" id="login-user" placeholder="Enter username" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input class="form-input" type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password" required>
                    </div>
                    <button class="submit-btn login-btn" type="submit" id="login-btn">Login</button>
                </form>
            </div>

            <!-- Register Form -->
            <div class="form-panel" id="panel-register">
                <form onsubmit="doRegister(event)">
                    <div class="form-group">
                        <label>Username</label>
                        <input class="form-input" type="text" id="reg-user" placeholder="Choose a username" autocomplete="username" required minlength="2">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input class="form-input" type="password" id="reg-pass" placeholder="Choose a password (6+ characters)" autocomplete="new-password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input class="form-input" type="password" id="reg-pass2" placeholder="Confirm password" autocomplete="new-password" required>
                    </div>
                    <button class="submit-btn register-btn" type="submit" id="reg-btn">Create Account</button>
                </form>
            </div>

            <div class="footer-text">Data secured locally. Credentials never leave this server.</div>
        </div>
    </div>

    <script>
        // Auto-switch to register tab if first use
        var needRegister = {{ 'true' if need_register else 'false' }};
        if (needRegister) switchTab('register');

        function switchTab(tab) {
            document.getElementById('tab-login').className = tab === 'login' ? 'tab active' : 'tab';
            document.getElementById('tab-register').className = tab === 'register' ? 'tab active' : 'tab';
            document.getElementById('panel-login').className = tab === 'login' ? 'form-panel active' : 'form-panel';
            document.getElementById('panel-register').className = tab === 'register' ? 'form-panel active' : 'form-panel';
            hideMessages();
        }

        function hideMessages() {
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'none';
        }

        function showError(msg) {
            var el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }

        function showSuccess(msg) {
            var el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
        }

        function doLogin(e) {
            e.preventDefault();
            hideMessages();
            var user = document.getElementById('login-user').value.trim();
            var pass = document.getElementById('login-pass').value;
            var btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            })
            .then(function(r) { return r.json().then(function(d) { return {status: r.status, data: d}; }); })
            .then(function(res) {
                if (res.data.ok) {
                    window.location.href = '/';
                } else {
                    showError(res.data.error || 'Login failed');
                }
            })
            .catch(function() { showError('Network error'); })
            .finally(function() { btn.disabled = false; btn.textContent = 'Login'; });
        }

        function doRegister(e) {
            e.preventDefault();
            hideMessages();
            var user = document.getElementById('reg-user').value.trim();
            var pass = document.getElementById('reg-pass').value;
            var pass2 = document.getElementById('reg-pass2').value;

            if (pass !== pass2) {
                showError('Passwords do not match');
                return;
            }

            var btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            })
            .then(function(r) { return r.json().then(function(d) { return {status: r.status, data: d}; }); })
            .then(function(res) {
                if (res.data.ok) {
                    window.location.href = '/';
                } else {
                    showError(res.data.error || 'Registration failed');
                }
            })
            .catch(function() { showError('Network error'); })
            .finally(function() { btn.disabled = false; btn.textContent = 'Create Account'; });
        }
    </script>
</body>
</html>
